{% extends 'base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">
                    <h3>Register</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {{ form.non_field_errors }}


                        {% for field in form %}

                        <div class="mb-3">

                            <label class="form-label">
                                {{ field.label }}
                            </label>

                            {{ field }}

                            {% if field.errors %}
                                <div class="text-danger">
                                    {{ field.errors }}
                                </div>
                            {% endif %}

                        </div>

                        {% endfor %}


                        <button type="submit"
                                class="btn btn-primary w-100">
                            Register
                        </button>


                    </form>


                    <p class="text-center mt-3">
                        Already have an account?
                        <a href="{% url 'login' %}">
                            Login
                        </a>
                    </p>


                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
