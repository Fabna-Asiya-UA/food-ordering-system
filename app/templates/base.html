<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Ordering System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

    <style>
        body{
            background:#f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar-custom{
            background:linear-gradient(90deg,#ff512f,#dd2476);
            box-shadow:0 8px 20px rgba(0,0,0,.15);
        }

        .navbar-brand{
            font-size:28px;
            font-weight:bold;
            letter-spacing:1px;
        }

        .navbar-brand i{
            color:#ffd700;
        }

        .nav-btn{
            margin-left:10px;
            border-radius:30px;
            padding:8px 18px;
            font-weight:600;
            transition:.3s;
        }

        .nav-btn:hover{
            transform:translateY(-3px);
            box-shadow:0 8px 15px rgba(0,0,0,.2);
        }

        .banner{
            background:linear-gradient(to right,#00b09b,#96c93d);
            color:white;
            text-align:center;
            padding:14px;
            font-size:20px;
            font-weight:600;
            letter-spacing:1px;
            box-shadow:0 5px 10px rgba(0,0,0,.15);
        }

        .content-card{
            background:white;
            border-radius:20px;
            padding:30px;
            margin-top:30px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        footer{
            margin-top:60px;
            background:#212529;
            color:white;
            text-align:center;
            padding:20px;
        }

        footer i{
            color:#ffc107;
        }
    </style>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container">

        <a class="navbar-brand" href="{% url 'food_list' %}">
            <i class="f"></i> Food Ordering System </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarNav">

            <a href="{% url 'food_list' %}" class="btn btn-light nav-btn"> <i class="fas fa-list"></i> Menu</a>

            {% if user.is_authenticated %}

            <a href="{% url 'cart' %}" class="btn btn-warning nav-btn">
                <i class="fas fa-shopping-cart"></i> Cart </a>

            <a href="{% url 'order_history' %}" class="btn btn-info text-white nav-btn">
                <i class="fas fa-receipt"></i> Orders</a>

            <a href="{% url 'logout' %}" class="btn btn-danger nav-btn">
                <i class="fas fa-sign-out-alt"></i> Logout</a>

            {% else %}

            <a href="{% url 'login' %}" class="btn btn-success nav-btn">
                <i class="fas fa-sign-in-alt"></i> Login</a>

            <a href="{% url 'register' %}" class="btn btn-primary nav-btn">
                <i class="fas fa-user-plus"></i> Register</a>

            {% endif %}

        </div>
    </div>
</nav>

<div class="banner">
     Delicious Food Delivered Fresh & Fast 
</div>

<div class="container">
    <div class="content-card">

        {% block content %}
        {% endblock %}

    </div>
</div>

<footer>
    <p class="mb-0">
        <i class="fas "></i>
        Food Ordering System © 2026 
    </p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
